<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Tớ Thương ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --primary-light: #ff8fa3;
            --neon-glow: 0 0 20px rgba(255, 77, 109, 0.6), 0 0 40px rgba(255, 77, 109, 0.3);
            --font-main: 'Quicksand', sans-serif;
            --font-fancy: 'Dancing Script', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #fff0f3, #ffccd5, #ffb3c1, #ffe5ec);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: var(--font-main);
            overflow: hidden;
            position: relative;
            transition: background 1.5s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ĐÃ SỬA LỖI: Dùng nền Galaxy Gradient thay vì link ảnh lỗi */
        body.success-bg {
            background: linear-gradient(-45deg, #0f0c1b, #200110, #2d0b1e, #050515) !important;
            background-size: 400% 400% !important;
            animation: gradientBG 8s ease infinite !important;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
        }

        .card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 55px 40px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 70px rgba(255, 77, 109, 0.2),
                        inset 0 0 30px rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body.success-bg .card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 77, 109, 0.4);
            box-shadow: 0 30px 70px rgba(255, 77, 109, 0.4),
                        inset 0 0 30px rgba(255, 77, 109, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255, 77, 109, 0.3), transparent 30%);
            animation: rotateGlow 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        .card-content {
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: background 0.5s ease;
        }

        body.success-bg .card-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .heart-glow-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .header-icon {
            font-size: 75px;
            display: inline-block;
            animation: floatAndPulse 2.5s ease-in-out infinite alternate;
            filter: drop-shadow(var(--neon-glow));
            position: relative;
            z-index: 2;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 77, 109, 0.25);
            border-radius: 50%;
            animation: rippleEffect 2.5s linear infinite;
            z-index: 1;
        }

        @keyframes floatAndPulse {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-15px) scale(1.1); }
        }

        @keyframes rippleEffect {
            0% { width: 70px; height: 70px; opacity: 1; }
            100% { width: 190px; height: 190px; opacity: 0; }
        }

        h1 {
            font-family: var(--font-fancy);
            font-size: 46px;
            background: linear-gradient(45deg, #ff4d6d, #ff758f, #c9184a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-weight: 700;
        }

        body.success-bg h1 {
            background: linear-gradient(45deg, #fff, #ff758f, #ff4d6d);
            -webkit-background-clip: text;
        }

        .prompt-text {
            font-size: 19px;
            color: #3f4e66;
            margin-bottom: 45px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.4s ease;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            min-height: 80px;
        }

        button {
            padding: 18px 42px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-main);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
            outline: none;
        }

        #btnYes {
            background: linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }

        #btnYes:hover {
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.7), var(--neon-glow);
        }

        #btnNo {
            background: rgba(255, 255, 255, 0.75);
            color: #475569;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .shake {
            animation: shakeAnimate 0.4s ease-in-out;
        }

        @keyframes shakeAnimate {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-12px); }
            30%, 60%, 90% { transform: translateX(12px); }
        }

        /* Success Screen */
        .success-content {
            display: none;
            opacity: 0;
            transform: scale(0.85);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-content.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .success-gif {
            width: 100%;
            max-width: 260px;
            border-radius: 20px;
            margin: 25px auto;
            box-shadow: 0 25px 50px rgba(255, 77, 109, 0.4), var(--neon-glow);
            border: 3px solid rgba(255, 255, 255, 0.3);
            display: block;
        }

        .love-signature {
            font-family: var(--font-fancy);
            font-size: 38px;
            background: linear-gradient(45deg, #fff, #ff8fa3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 25px;
            font-weight: bold;
            text-shadow: var(--neon-glow);
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="card-wrapper">
        <div class="card" id="mainCard">
            <div class="card-content">
                <!-- Màn hỏi -->
                <div id="askSection">
                    <div class="heart-glow-container">
                        <div class="header-icon" id="headerEmoji">💝</div>
                        <div class="ripple"></div>
                    </div>
                    <h1 id="mainTitle">Làm người yêu tớ nhé?</h1>
                    <div class="prompt-text" id="promptMessage">Tớ đã chuẩn bị cả cuộc đời này chỉ để đợi cái gật đầu của cậu... ✨</div>
                    
                    <div class="btn-container">
                        <button id="btnYes" onclick="celebrateLove()">Có chứ! 🥰</button>
                        <button id="btnNo" onclick="handleNoClick()">Không 😢</button>
                    </div>
                </div>

                <!-- Màn ăn mừng với GIF bùng nổ -->
                <div id="successSection" class="success-content">
                    <div class="heart-glow-container">
                        <div class="header-icon">💖</div>
                        <div class="ripple" style="animation-duration: 1.5s"></div>
                    </div>
                    <h1>Hạnh phúc quá đi mất!</h1>
                    <p style="font-size: 18px; color: #f1f5f9; line-height: 1.6; font-weight: 600;">
                        Cảm ơn cậu vì đã bằng lòng bước vào thế giới của tớ.<br>Hứa sẽ làm cậu mỉm cười mỗi ngày!
                    </p>
                    
                    <!-- Sử dụng hình ảnh động đầy lãng mạn mà bạn vừa gửi -->
                    <img class="success-gif" src="https://media.giphy.com/media/n9HfdJCqnh01e99KtB/giphy.gif" alt="I Love You">
                    
                    <div class="love-signature">Yêu cậu vô điều kiện! 👩‍❤️‍👨</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const noPrompts = [
            "Ơ kìa, nút 'Không' bị kẹt rồi, thử lại nút bên cạnh xem! 🥺",
            "Ngoan thương nè, nhấn vào nút màu hồng rực rỡ kia đi mờ 👉👈",
            "Đừng từ chối mà, tớ sẽ khóc một dòng sông cho cậu xem đó 💔",
            "Nút 'Có' to thế kia là vì nó chứa đầy tình cảm của tớ đấy! 🔍",
            "Vẫn cố chấp bấm 'Không' sao? Định mệnh bảo cậu phải đồng ý rồi! 🤭",
            "Xem kìa, nút 'Không' bị thu bé lại sắp biến mất luôn rồi! 👀",
            "Tớ thương cậu thật lòng mà, đừng trêu tớ nữa nhaaa 🥺",
            "Hết cơ hội rồi! Chỉ còn một lối đi duy nhất là đồng ý thôii!"
        ];

        const emojis = ["🥺", "👉👈", "💔", "😭", "😿", "💖", "🔥"];

        let clickCount = 0;
        let yesScale = 1;
        let noScale = 1;

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let isCelebration = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class HeartParticle {
            constructor(x, y, size, speedX, speedY, opacity, color, isMouseGenerated = false) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
                this.opacity = opacity;
                this.color = color || `rgba(255, 77, 109, ${opacity})`;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.04;
                this.isMouseGenerated = isMouseGenerated;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 4);
                ctx.bezierCurveTo(-this.size / 2, -this.size, -this.size, -this.size / 3, 0, this.size);
                ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size, 0, -this.size / 4);
                ctx.fillStyle = this.color;
                if (this.isMouseGenerated || isCelebration) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(255, 77, 109, 0.9)';
                }
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                
                if (isCelebration || this.isMouseGenerated) {
                    this.speedY += 0.04; 
                    if (this.isMouseGenerated) {
                        this.opacity -= 0.015; 
                    }
                } else {
                    if (this.y < -this.size) {
                        this.y = canvas.height + this.size;
                        this.x = Math.random() * canvas.width;
                    }
                }
            }
        }

        function initAmbientHearts() {
            for (let i = 0; i < 30; i++) {
                const size = Math.random() * 14 + 10;
                particles.push(new HeartParticle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    size,
                    (Math.random() - 0.5) * 0.4,
                    -(Math.random() * 0.5 + 0.3),
                    Math.random() * 0.3 + 0.1
                ));
            }
        }
        initAmbientHearts();

        window.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.15) return; 
            const size = Math.random() * 8 + 6;
            particles.push(new HeartParticle(
                e.clientX,
                e.clientY,
                size,
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2 - 1,
                0.8,
                `rgba(255, ${Math.floor(Math.random()*100 + 100)}, 150, 0.8)`,
                true
            ));
        });

        window.addEventListener('touchmove', function(e) {
            if (Math.random() > 0.2) return;
            const touch = e.touches[0];
            const size = Math.random() * 8 + 6;
            particles.push(new HeartParticle(
                touch.clientX,
                touch.clientY,
                size,
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2 - 1,
                0.8,
                'rgba(255, 77, 109, 0.8)',
                true
            ));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                particles[i].draw();
                if (isCelebration && particles[i].y > canvas.height + 50) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        function handleNoClick() {
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            const promptText = document.getElementById('promptMessage');
            const headerEmoji = document.getElementById('headerEmoji');
            
            clickCount++;

            const card = document.getElementById('mainCard');
            card.classList.remove('shake');
            void card.offsetWidth; 
            card.classList.add('shake');

            yesScale += 0.45;
            noScale = Math.max(0.3, noScale - 0.15);

            btnYes.style.transform = `scale(${yesScale})`;
            btnNo.style.transform = `scale(${noScale})`;

            const promptIndex = Math.min(clickCount - 1, noPrompts.length - 1);
            promptText.style.opacity = 0;
            setTimeout(() => {
                promptText.innerText = noPrompts[promptIndex];
                promptText.style.opacity = 1;
            }, 150);

            headerEmoji.innerText = emojis[Math.min(clickCount, emojis.length - 1)];
        }

        function celebrateLove() {
            isCelebration = true;
            particles = []; 

            // Kích hoạt hình nền Neon lãng mạn từ bức ảnh bạn gửi
            document.body.classList.add('success-bg');

            // Hiệu ứng pháo hoa vàng óng lấp lánh như trong GIF
            const colors = ['#ffb3c1', '#ffe5ec', '#ffb703', '#fb8500', '#ffffff', '#ff4d6d'];
            for (let i = 0; i < 250; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 5;
                particles.push(new HeartParticle(
                    canvas.width / 2,
                    canvas.height / 2 - 50,
                    Math.random() * 14 + 6,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 5,
                    Math.random() * 0.8 + 0.2,
                    colors[Math.floor(Math.random() * colors.length)]
                ));
            }

            document.getElementById('askSection').style.display = 'none';
            const successSection = document.getElementById('successSection');
            successSection.style.display = 'block';
            setTimeout(() => {
                successSection.classList.add('active');
            }, 50);
        }
    </script>
</body>
  </html>
